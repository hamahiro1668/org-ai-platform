version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=orgai
      - POSTGRES_PASSWORD=orgai-dev-password
      - POSTGRES_DB=orgai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orgai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    ports:
      - "5678:5678"
    env_file: .env
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - WEBHOOK_URL=http://localhost:5678
      - GENERIC_TIMEZONE=Asia/Tokyo
      - N8N_PUBLIC_API_DISABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  ai-engine:
    build:
      context: .
      dockerfile: apps/ai-engine/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://orgai:orgai-dev-password@postgres:5432/orgai
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      ai-engine:
        condition: service_healthy
      postgres:
        condition: service_healthy
      n8n:
        condition: service_started
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://orgai:orgai-dev-password@postgres:5432/orgai
      - AI_ENGINE_URL=http://ai-engine:8000
      - N8N_URL=http://n8n:5678
      - N8N_WORKFLOW_ID=${N8N_WORKFLOW_ID}
      - N8N_API_KEY=${N8N_API_KEY}
      # ローカルn8nを使用（クラウドは手動更新後に有効化）
      # - N8N_CLOUD_URL=https://hamahiro.app.n8n.cloud
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ws://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  n8n_data:
  pgdata:
